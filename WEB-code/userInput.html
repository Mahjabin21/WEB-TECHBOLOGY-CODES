<!DOCTYPE html>
<html>
    <head>
        <title>User input</title>
    </head>
    <body>
        <form>
            <label for="name">Name:</label>
            <input type="text" id="name" name="name"><br><br>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email"><br><br>
            <label for="password">Password:</label>
            <input type="password" id="password" name="password"><br><br>
            <input type="submit" value="Submit">
        </form>
        <form action="aboutMe.html" method="get">
            <input type="submit" value="Go to About Me">
        </form>

        <input type="checkbox" id="hobby1" name="hobby" value="programming">
        <label for="hobby1">Programming</label><br>

        <input type="checkbox" id="hobby2" name="hobby" value="web development">
        <label for="hobby2">Web Development</label><br>
        <label drop="true" for="drag1">Drag me to my target</label><br>
        <select>
            <option value="Select an aption" >Select an option</option>
            <option value="option1">Option 1</option>
            <option value="option2">Option 2</option>
            <option value="option3">Option 3</option>   
        </select><br>
        <input type="radio" id="male" name="gender" value="male">
        <label for="male">Male</label><br>
        <input type="radio" id="female" name="gender" value="female">
        <label for="female">Female</label><br>

        <input type = "file" accept="pdf/*" id="myfile" name="myfile"><br><br>
    </body>
</html>
