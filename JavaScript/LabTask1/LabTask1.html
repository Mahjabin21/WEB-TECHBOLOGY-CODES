<!Doctype html>
<html>

<head>
    <script src="index.js" defer></script>
</head>

<body>
    <div id="container">
        <form id="signUp">
            <label type="text">Full Name: </label>
            <input type="text" id="name"><br><br>
            <div class="error" id="nameError"></div>

            <label type="email">Email: </label>
            <input type="email" id="email"><br><br>
            <div class="error" id="emailError"></div>

            <label type="password">Password: </label>
            <input type="password" id="password"><br><br>
            <div class="error" id="passError" style="color:red;"></div>

            <label type="password">Confirm Password: </label>
            <input type="password" id="confirmpass"><br><br>
            <div class="error" id="confPassError" style="color:red;"></div>

            <label type="number">Phone number: </label>
            <input type="number" id="phone"><br><br>
            <div class="error" id="phoneError" style="color:red;"></div>


            <button type="submit">Submit</button>
        </form>
        <div id="success"></div>
    </div>
</body>

</html>
