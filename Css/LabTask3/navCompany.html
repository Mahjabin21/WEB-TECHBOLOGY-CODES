<!DOCTYPE html>
<html>

<head>
    <title>Navigation Bar Styling</title>
    <style>
        nav {
            background-color: rgba(65, 65, 221, 0.509);
            width: 100%;
            height: 10px 0;
        }

        nav a {

            color: #ffffff;
            display: inline-block;
            margin: 5px;
            padding: 10px 20px;
            text-decoration: none;
        }

        nav a:hover {
            background-color: rgb(91, 91, 255);
            color: black
        }
    </style>
</head>

<body>
    <header>
        <nav>
            <a href="#"><b>Home</b> </a>
            <a href="#"><b>About</b></a>
            <a href="#"><b>Services</b></a>
            <a href="#"><b>Gallery</b></a>
            <a href="#"><b>Contact</b></a>
        </nav>
    </header>
</body>

</html>
