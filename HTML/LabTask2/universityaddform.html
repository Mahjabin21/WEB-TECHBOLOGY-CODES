<!DOCTYPE html>
<html>

<head>
    <title>AIUB Admission</title>
</head>

<body>
    <h1>Admission Form</h1>
    <form>
        <fieldset>
            <legend>Personal Information</legend>

            <label for="Full Name">Full Name:</label><br>
            <input type="text" name="fullname" maxlength="50" required><br><br>

            <label for="email">Email:</label><br>
            <input type="email" name="email" required><br><br>

            <label for="date of birth">Date Of Birth:</label><br>
            <input type="date" name="dob" required><br><br>

            <label for="gender">Gender:</label>
            <input type="radio" name="gender" value="Male" required>Male
            <input type="radio" name="gender" value="Female">Female
            <input type="radio" name="gender" value="Others">Others
        </fieldset>
    </form><br>


    <form>
        <fieldset>
            <legend>Academic Information</legend>
            <label for="Previous Institution">Previous Institution:</label><br>
            <input type="text" name="previnstitute" maxlength="100" required><br><br>

            <label for="dept">Department:</label><br>
            <select name="department" required>
                <option value="">Select Department</option><br><br>
                <option>CSE</option>
                <option>EEE</option>
                <option>IPE</option>
                <option>BBA</option>
            </select><br><br>

            <label>Interests:</label>
            <input type="checkbox" name="interest" value="Programming"> Programming
            <input type="checkbox" name="interest" value="Networking"> Networking
            <input type="checkbox" name="interest" value="AI"> AI
            <input type="checkbox" name="interest" value="Web Development"> Web Development
    </form>
    <br><br>
    <form>
        <fieldset>
            <legend>Required Documents</legend><br>

            <label>Upload Transcript/Resume:</label>
            <input type="file" name="document" required>
        </fieldset>
        <br>
        <input type="submit" value="Submit">
        <input type="reset" value="Reset">

    </form>

</body>

</html>
